name: Monitor SIEDCO Jamundí - Consolidado Multi-Delito

on:
  schedule:
    # Corre cada 12 horas (a las 00:00 y 12:00 UTC)
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Restaurar caché de datos de SIEDCO
        uses: actions/cache@v4
        with:
          path: |
            resumen_actual.json
            resumen_anterior.json
          key: siedco-cache-${{ github.run_id }}
          restore-keys: |
            siedco-cache-

      - name: Ejecutar Monitor SIEDCO
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          EMAIL_DEST: ${{ secrets.EMAIL_DEST }}
        run: python monitor_siedco.py
